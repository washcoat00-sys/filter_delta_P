    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<body>
    <div class="dpf-wide-container">
        <header>
            <div class="header-left">
                <img src="LOGO.png" alt="Logo" class="main-logo">
                <nav class="mode-tabs">
                    <button id="tab-deltap" class="tab-btn active" onclick="switchMode('deltap')">
                        <span class="icon">📊</span> 필터 차압분석
                    </button>
                    <button id="tab-flow" class="tab-btn" onclick="switchMode('flow')">
                        <span class="icon">🌪️</span> 촉매 유동 분석
                    </button>
                </nav>
            </div>
            <button id="theme-toggle" class="theme-btn">테마 변경</button>
        </header>
        
        <!-- 차압 분석 컨테이너 (deltaP.html에서 로드됨) -->
        <div id="deltap-content" class="main-layout">
            <div class="placeholder-msg">필터 차압분석 모듈 로딩 중...</div>
        </div>

        <!-- 유동 분석 컨테이너 (flow.html에서 로드됨) -->
        <div id="flow-content" class="main-layout" style="display: none;">
            <div class="placeholder-msg">촉매 유동 분석 모듈 로딩 중...</div>
        </div>
    </div>
