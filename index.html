<body>
    <div class="dpf-wide-container">
        <header>
            <div class="header-left">
                <h1>분석 시스템 v2.3</h1>
                <nav class="mode-tabs">
                    <button id="tab-deltap" class="tab-btn active" onclick="switchMode('deltap')">
                        <span class="icon">📊</span> 차압 분석
                    </button>
                    <button id="tab-flow" class="tab-btn" onclick="switchMode('flow')">
                        <span class="icon">🌪️</span> 유동 분석
                    </button>
                </nav>
            </div>
            <button id="theme-toggle" class="theme-btn">테마 변경</button>
        </header>
        
        <!-- 차압 분석 모드 (기존 레이아웃) -->
        <div id="deltap-content" class="main-layout">
            <!-- 왼쪽: 입력창 (폭 1/3) -->
            <aside class="layout-col col-inputs">
                <!-- ... 생략 ... -->
            </aside>

            <div class="resizer" id="resizer-dp-1"></div>

            <!-- 중간: 상태 분석 결과 (폭 1/3) -->
            <main class="layout-col col-results">
                <!-- ... 생략 ... -->
            </main>

            <div class="resizer" id="resizer-dp-2"></div>

            <!-- 오른쪽: 분석 그래프 (폭 1/3) -->
            <section class="layout-col col-graph">
                <!-- ... 생략 ... -->
            </section>
        </div>

        <!-- 유동 분석 모드 (새로운 레이아웃) -->
        <div id="flow-content" class="main-layout" style="display: none;">
            <aside class="layout-col col-inputs">
                <!-- ... 생략 ... -->
            </aside>

            <div class="resizer" id="resizer-flow-1"></div>
            
            <main class="layout-col col-results">
                <!-- ... 생략 ... -->
            </main>

            <div class="resizer" id="resizer-flow-2"></div>
            
            <section class="layout-col col-graph">
                <!-- ... 생략 ... -->
            </section>
        </div>
    </div>
